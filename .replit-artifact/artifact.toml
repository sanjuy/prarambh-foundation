kind = "web"
previewPath = "/"
title = "Prarambh Foundation"
version = "1.0.0"
id = "artifacts/prarambh-foundation"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20409

[services.development]
run = "pnpm --filter @workspace/prarambh-foundation run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prarambh-foundation", "run", "build" ]
publicDir = "artifacts/prarambh-foundation/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20409"
BASE_PATH = "/"
